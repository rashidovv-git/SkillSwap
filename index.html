<!doctype html>
<html lang="ru" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=DM+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'DM Sans', sans-serif; }
.slide { display: none; min-height: 100%; width: 100%; padding: 48px; position: relative; overflow: hidden; }
.slide.active { display: flex; flex-direction: column; justify-content: center; }
.bg-main { background: #0a0a12; }
.grad-text { background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.grad-border { border-image: linear-gradient(135deg, #a855f7, #6366f1) 1; }
.card-g { background: linear-gradient(145deg, rgba(139,92,246,0.08), rgba(59,130,246,0.05)); border: 1px solid rgba(139,92,246,0.15); border-radius: 16px; }
.glow-orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; pointer-events: none; }
.font-head { font-family: 'Space Grotesk', sans-serif; }
@keyframes fadeUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }
.anim { animation: fadeUp 0.6s ease forwards; }
.anim-d1 { animation-delay: 0.1s; opacity: 0; }
.anim-d2 { animation-delay: 0.25s; opacity: 0; }
.anim-d3 { animation-delay: 0.4s; opacity: 0; }
.anim-d4 { animation-delay: 0.55s; opacity: 0; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s; }
.nav-dot.active { background: #a855f7; width: 24px; border-radius: 4px; }
.step-line { width: 48px; height: 2px; background: rgba(139,92,246,0.3); }
.bar { height: 6px; border-radius: 3px; background: linear-gradient(90deg, #a855f7, #3b82f6); }
.phone-mock { width: 200px; height: 400px; border-radius: 28px; border: 2px solid rgba(139,92,246,0.3); background: linear-gradient(180deg, #1a1a2e, #0f0f1a); position: relative; overflow: hidden; }
.phone-notch { width: 80px; height: 20px; background: #0a0a12; border-radius: 0 0 12px 12px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="bg-main h-full text-white overflow-auto">

    <div class="glow-orb" style="width:500px;height:500px;background:#a855f7;top:-100px;right:-100px;"></div>
    <div class="glow-orb" style="width:400px;height:400px;background:#3b82f6;bottom:-80px;left:-80px;"></div>
    <div class="flex flex-col items-center justify-center text-center gap-6 relative z-10">
     <div class="anim">
      <svg width="72" height="72" viewbox="0 0 72 72" fill="none"><circle cx="24" cy="36" r="18" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.7" /> <circle cx="48" cy="36" r="18" stroke="#6366f1" stroke-width="2.5" fill="none" opacity="0.7" /> <path d="M36 22 C30 30, 30 42, 36 50 C42 42, 42 30, 36 22Z" fill="url(#venn)" opacity="0.4" /> <defs>
        <lineargradient id="venn" x1="30" y1="22" x2="42" y2="50">
         <stop stop-color="#a855f7" />
         <stop offset="1" stop-color="#3b82f6" />
        </lineargradient>
       </defs>
      </svg>
     </div>
